name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: CI
        run: npm run ci

  scenario-mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Install browser engines
        run: npx playwright install --with-deps chromium webkit

      - name: Federated theme failure recovery scenario
        run: npm run scenario:theme-federation

      - name: Build
        run: npm run build

      - name: Lighthouse mobile scenarios
        run: npm run scenario:lighthouse

      - name: Cross-engine mobile scenarios
        run: npm run scenario:browser

      - name: Documents Mermaid performance scenario
        run: npm run scenario:documents

  pages-artifact:
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs:
      - npm-test
      - scenario-mobile
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Build Pages artifact
        run: |
          npm run pages:build -- \
            --config public/org-zhixing.toml \
            --content blog \
            --out dist \
            --base /org-zhixing-themes/
          npm run pages:themes -- \
            --config public/org-zhixing.toml \
            --out dist \
            --base /org-zhixing-themes/
          jq -r '.themes[] | [.id, .content.directory] | @tsv' dist/theme-manifest.json | \
          while IFS=$'\t' read -r theme content; do
            npm run pages:build -- \
              --config "dist/theme-configs/${theme}.toml" \
              --content "${content}" \
              --out "dist/themes/${theme}" \
              --base "/org-zhixing-themes/themes/${theme}/"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy-pages:
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs:
      - pages-artifact
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
