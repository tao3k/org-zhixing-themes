[site]
title = "知行合一"
locale = "zh-CN"

[content]
root = "blog"
default_source = "syntax-atlas"

[[content.sources]]
id = "syntax-atlas"
title = "Org Syntax Atlas"
file = "org-syntax-atlas.org"

[[content.sources]]
id = "demo"
title = "Org Zhixing Demo"
file = "org-zhixing-demo.org"

[[content.sources]]
id = "agenda-lab"
title = "Agenda Lab Notes"
file = "org-agenda-lab.org"

[[content.sources]]
id = "zen-essay"
title = "Zen Essay Notebook"
file = "org-zen-essay.org"

[[content.sources]]
id = "literate-lab"
title = "Literate Systems Lab"
file = "org-literate-lab.org"

[[content.sources]]
id = "research-notebook"
title = "Research Notebook"
file = "org-research-notebook.org"

[ui]
default_view = "agenda"
show_timings = true

[[ui.views]]
id = "blog"
label = "Blog"
weight = 10

[[ui.views]]
id = "records"
label = "Notes"
weight = 20

[[ui.views]]
id = "agenda"
label = "Agenda"
weight = 30

[behavior]
lazy_lint = true

[agenda]
start = "2026-05-15"
days = 7
limit = 32
mode = "classic"
